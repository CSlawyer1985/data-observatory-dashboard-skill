<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0f;--panel:#12121a;--fg:#e0e0e8;--muted:#888894;--sidebar-w:clamp(180px,14.4vw,228px);--rail-w:10px}
body{height:100vh;overflow:hidden;background:var(--bg);color:var(--fg);font-family:-apple-system,"PingFang SC","Microsoft YaHei","Noto Sans SC",system-ui,sans-serif}
#sidebar{position:fixed;inset:0 auto 0 0;width:var(--sidebar-w);padding:18px 12px 0;background:var(--panel);border-right:1px solid rgba(255,255,255,.06);overflow-y:auto;display:flex;flex-direction:column;gap:15px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.12) transparent;z-index:10;transition:transform .24s ease,box-shadow .24s ease}
#sidebar::after{content:"";position:absolute;top:0;right:0;width:var(--rail-w);height:100%;background:linear-gradient(to bottom,rgba(255,255,255,.08),rgba(255,255,255,.02));border-right:1px solid rgba(255,255,255,.12)}
body.sidebar-collapsed #sidebar{transform:translateX(calc(-1 * (var(--sidebar-w) - var(--rail-w))))}
.topbar{position:relative;padding-right:24px}.toggle-hide{position:fixed;top:18px;left:calc(var(--sidebar-w) - 26px);width:20px;height:20px;border:1px solid rgba(255,255,255,.08);border-radius:4px;background:rgba(255,255,255,.035);color:rgba(224,224,232,.48);font-size:12px;line-height:18px;cursor:pointer;z-index:40}.toggle-hide:hover{color:var(--fg);background:rgba(255,255,255,.1)}body.sidebar-collapsed .toggle-hide{left:0;width:14px;height:34px;line-height:32px;border-left:0;border-radius:0 4px 4px 0;background:rgba(18,18,26,.78);box-shadow:4px 0 14px rgba(0,0,0,.25)}
h1{font-size:14px;line-height:1.3;font-weight:650;letter-spacing:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.sub{font-size:10px;line-height:1.45;color:var(--muted);margin-top:5px}.section{display:flex;flex-direction:column;gap:7px}.section h3{font-size:10px;text-transform:uppercase;letter-spacing:0;color:var(--muted)}
.big{font-size:24px;font-weight:750;line-height:1}.modes{display:flex;flex-direction:column;gap:3px}.modes button{font:inherit;font-size:11px;text-align:left;color:var(--muted);background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:5px;padding:6px 8px;cursor:pointer}.modes button.active{color:var(--fg);background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.2);font-weight:650}
.legend{display:grid;grid-template-columns:auto 1fr auto;gap:6px;align-items:center;font-size:10px;color:var(--muted)}.legend-grad{height:8px;border-radius:2px;background:linear-gradient(to right,rgb(50,160,50),rgb(230,150,30),rgb(255,40,20))}.legend-caption{font-size:10px;color:var(--muted);display:flex;justify-content:space-between}
.hist{display:flex;align-items:flex-end;height:48px;gap:2px}.hist div{flex:1;min-height:2px;border-radius:1px 1px 0 0}.axis{display:flex;justify-content:space-between;font-size:9px;color:var(--muted);margin-top:-3px}.row{display:flex;align-items:center;gap:6px;font-size:11px;min-height:16px}.sw{width:10px;height:10px;border-radius:2px;flex:none}.name{flex:1;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.val{white-space:nowrap;font-variant-numeric:tabular-nums}.pct{width:34px;text-align:right;color:var(--muted);font-size:10px;font-variant-numeric:tabular-nums}
.barrow{display:grid;grid-template-columns:50px 1fr 50px;gap:6px;align-items:center;font-size:10px}.track{height:9px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden}.fill{height:100%;border-radius:2px}.toplist{display:flex;flex-direction:column;gap:5px}.topitem{display:grid;grid-template-columns:1fr auto;gap:8px;font-size:11px}.topitem span:first-child{color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.signature{position:sticky;bottom:0;margin-top:auto;padding:22px 0 15px;background:linear-gradient(to top,var(--panel) 72%,rgba(18,18,26,0));font-family:"Snell Roundhand","Zapfino","Apple Chancery","Brush Script MT",cursive;font-size:18px;font-weight:400;letter-spacing:0;color:rgba(224,224,232,.32);text-align:center}.signature:empty{display:none}
#canvas{position:fixed;top:0;left:var(--sidebar-w);display:block}#tooltip{position:fixed;pointer-events:none;max-width:360px;padding:12px 16px;background:var(--panel);border:1px solid rgba(255,255,255,.12);border-radius:8px;box-shadow:0 8px 32px rgba(0,0,0,.6);font-size:12px;line-height:1.5;opacity:0;transition:opacity .12s;z-index:20}#tooltip.visible{opacity:1}.tt-title{font-size:14px;font-weight:650;color:#fff;margin-bottom:6px}.tt-grid{display:grid;grid-template-columns:auto auto;gap:2px 12px}.tt-grid span:nth-child(odd){color:var(--muted)}.tt-grid span:nth-child(even){text-align:right}.tt-note{margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.06);color:var(--muted);font-size:11px}
@media(max-width:720px){:root{--sidebar-w:100vw;--rail-w:0px}body.sidebar-collapsed #sidebar{transform:none}#sidebar{position:fixed;left:0;right:0;bottom:auto;width:auto;max-height:44vh;z-index:5;padding-bottom:0}.toggle-hide{display:none}h1{font-size:15px}#canvas{top:44vh;left:0}.big{font-size:24px}.signature{display:none}}
</style>
</head>
<body>
<aside id="sidebar">
  <div class="topbar"><h1>{{TITLE}}</h1><div class="sub" id="subtitle">{{SUBTITLE}}</div></div>
  <div class="section"><h3>面积表示</h3><div class="modes" id="modes"></div></div>
  <div class="section"><h3 id="totalLabel">总量</h3><div class="big" id="total">-</div></div>
  <div class="section"><h3 id="weightedLabel">加权平均</h3><div class="big" id="weighted">-</div><div class="sub">按当前面积加权</div></div>
  <div class="section">
    <h3 id="legendTitle">颜色图例</h3>
    <div class="legend"><span id="legendMin">低</span><span class="legend-grad"></span><span id="legendMax">高</span></div>
    <div class="legend-caption"><span>低值</span><span id="scoreLabel"></span><span>高值</span></div>
  </div>
  <div class="section"><h3 id="histTitle">颜色指标分布</h3><div class="hist" id="hist"></div><div class="axis"><span id="histMin">-</span><span id="histMax">-</span></div></div>
  <div class="section"><h3>分级概览</h3><div id="tiers"></div></div>
  <div class="section"><h3>分组概览</h3><div id="groups"></div></div>
  <div class="section" id="breakdownSection"><h3>结构概览</h3><div id="breakdown"></div></div>
  <div class="section"><h3 id="topTitle">高值对象</h3><div class="toplist" id="topList"></div></div>
  <div class="signature" id="signature"></div>
</aside>
<button class="toggle-hide" id="toggleSidebar" title="折叠侧栏" aria-label="折叠侧栏">‹</button>
<canvas id="canvas"></canvas>
<div id="tooltip"><div class="tt-title"></div><div class="tt-grid"></div><div class="tt-note"></div></div>
<script type="application/json" id="embeddedData">{{DATA_JSON}}</script>
<script>
const CONFIG = {{CONFIG_JSON}};
let data=[], rects=[], hovered=null, mode=CONFIG.modes[0].key, dpr=devicePixelRatio||1;
const canvas=document.getElementById("canvas"), ctx=canvas.getContext("2d"), GAP=1.5, MARGIN=12;
function modeObj(){return CONFIG.modes.find(m=>m.key===mode)||CONFIG.modes[0]}
function scoreMin(){return CONFIG.scoreMin ?? Math.min(...data.map(score))}
function scoreMax(){return CONFIG.scoreMax ?? Math.max(...data.map(score))}
function colorStops(){return CONFIG.colorScheme==="growth"?[[185,45,38],[215,155,42],[62,154,76]]:[[50,160,50],[230,150,30],[255,40,20]]}
function mix(a,b,t){return a.map((x,i)=>Math.round(x+(b[i]-x)*t))}
function colorScale(v){const min=scoreMin(),max=scoreMax(),stops=colorStops();const t=Math.max(0,Math.min(1,(Number(v)-min)/(max-min||1)));return t<.5?mix(stops[0],stops[1],t/.5):mix(stops[1],stops[2],(t-.5)/.5)}
function legendGradient(){return `linear-gradient(to right,${colorStops().map(c=>`rgb(${c[0]},${c[1]},${c[2]})`).join(",")})`}
function css(v,a=1){const [r,g,b]=colorScale(Number(v)||0);return `rgba(${r},${g},${b},${a})`}
function value(d){return Math.max(0,Number(d[modeObj().field])||0)}
function score(d){return Number(d[CONFIG.scoreField])||0}
function label(d){return d[CONFIG.labelField] ?? d.label ?? d.name ?? ""}
function group(d){return d[CONFIG.groupField] ?? "未分组"}
function num(n){return Number(n)||0}
function cn(n,dec=0){return num(n).toLocaleString("zh-CN",{maximumFractionDigits:dec})}
function unitOf(field){const u=(CONFIG.units||{})[field];if(u)return u;if(/(_wan$|万元)/.test(field))return "wan_cny";if(/万人|population_wan/i.test(field))return "wan_person";if(/(_ratio$|占比|比例|percent)/i.test(field))return "percent";if(/lawyers|律师|人员|人数/.test(field))return "person";if(/cases|案件|件$/.test(field))return "case";if(/clients|家数|家$/.test(field))return "client";if(/times|次数|次$/.test(field))return "times";return ""}
function fmtGeneric(n,dec=0){n=num(n);if(Math.abs(n)>=1e8)return cn(n/1e8,1)+"亿";if(Math.abs(n)>=1e4)return cn(n/1e4,1)+"万";return cn(n,dec)}
function fmtWan(n,dec=1){n=num(n);return Math.abs(n)>=10000?cn(n/10000,dec)+"亿":cn(n,dec)+"万"}
function fmtMetric(field,n,dec=1){const u=unitOf(field);if(u==="wan_cny")return fmtWan(n,dec);if(u==="wan_cny_per_person")return fmtWan(n,dec)+"/人";if(u==="wan_person")return fmtWan(n,dec)+"人";if(u==="percent")return cn(n,dec)+"%";if(u==="permille")return cn(n,dec)+"‰";if(u==="person")return cn(n,0)+"人";if(u==="case")return cn(n,0)+"件";if(u==="client")return cn(n,0)+"家";if(u==="times")return cn(n,0)+"次";return fmtGeneric(n,dec)}
function fmtScore(n){return fmtMetric(CONFIG.scoreField,n,1)}
function detailValue(d,f){const v=d[f.field];if(v===null||v===undefined||v==="")return "-";if(typeof v==="number")return fmtMetric(f.field,v,2);return String(v)}
function squarify(items,x,y,w,h){if(!items.length)return[];if(items.length===1)return[{...items[0],rx:x,ry:y,rw:w,rh:h}];let total=items.reduce((s,d)=>s+d.value,0);if(total<=0)return[];let out=[],rem=[...items],cx=x,cy=y,cw=w,ch=h;while(rem.length){let remTotal=rem.reduce((s,d)=>s+d.value,0),vertical=cw>=ch,side=vertical?ch:cw,row=[rem[0]],rowSum=rem[0].value;for(let i=1;i<rem.length;i++){let cand=[...row,rem[i]],candSum=rowSum+rem[i].value;if(worst(cand,candSum,side,remTotal,vertical?cw:ch)<worst(row,rowSum,side,remTotal,vertical?cw:ch)){row=cand;rowSum=candSum}else break}let thick=(vertical?cw:ch)*(rowSum/remTotal),off=0;for(const item of row){let len=side*(item.value/rowSum);out.push(vertical?{...item,rx:cx,ry:cy+off,rw:thick,rh:len}:{...item,rx:cx+off,ry:cy,rw:len,rh:thick});off+=len}if(vertical){cx+=thick;cw-=thick}else{cy+=thick;ch-=thick}rem=rem.slice(row.length)}return out}
function worst(row,rowSum,side,total,extent){let rowExtent=extent*(rowSum/total);if(!rowExtent)return Infinity;return Math.max(...row.map(i=>{let len=side*(i.value/rowSum);return len?Math.max(rowExtent/len,len/rowExtent):0}))}
function railWidth(){return innerWidth<=720?0:parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--rail-w"))||0}
function sidebarWidth(){return innerWidth<=720?0:document.getElementById("sidebar").getBoundingClientRect().width}
function sidebarReserve(){return document.body.classList.contains("sidebar-collapsed")?railWidth():sidebarWidth()}
function layout(){const sidebar=sidebarReserve();const top=innerWidth<=720?Math.round(innerHeight*.44):0;const w=innerWidth-sidebar,h=innerHeight-top;canvas.width=w*dpr;canvas.height=h*dpr;canvas.style.left=sidebar+"px";canvas.style.width=w+"px";canvas.style.height=h+"px";canvas.style.top=top+"px";let by={};for(const d of data){(by[group(d)] ||= []).push(d)}let cats=Object.keys(by).map(k=>({cat:k,items:by[k].sort((a,b)=>value(b)-value(a)),value:by[k].reduce((s,d)=>s+value(d),0)})).sort((a,b)=>b.value-a.value);rects=[];for(const cr of squarify(cats,MARGIN,MARGIN,w-MARGIN*2,h-MARGIN*2)){for(const r of squarify(cr.items.map(d=>({...d,value:value(d)})),cr.rx+GAP,cr.ry+GAP,cr.rw-GAP*2,cr.rh-GAP*2))rects.push(r)}}
function draw(){ctx.setTransform(dpr,0,0,dpr,0,0);ctx.fillStyle="#0a0a0f";ctx.fillRect(0,0,canvas.width/dpr,canvas.height/dpr);for(const r of rects){let is=r===hovered,g=GAP/2,rx=r.rx+g,ry=r.ry+g,rw=r.rw-g*2,rh=r.rh-g*2;if(rw<=0||rh<=0)continue;ctx.fillStyle=css(score(r),is ? .82 : .52);ctx.fillRect(rx,ry,rw,rh);if(is){ctx.strokeStyle="#fff";ctx.lineWidth=2;ctx.strokeRect(rx,ry,rw,rh)}if(rw>56&&rh>20){ctx.save();ctx.beginPath();ctx.rect(rx+4,ry+2,rw-8,rh-4);ctx.clip();let fs=Math.min(13,Math.max(9,Math.min(rw/10,rh/3)));ctx.font=`650 ${fs}px -apple-system,"PingFang SC","Microsoft YaHei",sans-serif`;ctx.fillStyle=is?"#fff":"rgba(255,255,255,.86)";ctx.textBaseline="top";ctx.fillText(label(r),rx+5,ry+4);if(rh>36&&rw>68){ctx.font=`400 ${Math.max(8,fs-2)}px -apple-system,"PingFang SC",sans-serif`;ctx.fillStyle="rgba(255,255,255,.56)";ctx.fillText(`${fmtScore(score(r))} · ${fmtMetric(modeObj().field,value(r),1)}`,rx+5,ry+fs+7)}ctx.restore()}}}
function tierDefs(){if(CONFIG.tiers?.length)return CONFIG.tiers;const min=scoreMin(),max=scoreMax(),step=(max-min)/5||1;return [0,1,2,3,4].map(i=>({label:`${fmtScore(min+i*step)}-${fmtScore(min+(i+1)*step)}`,min:min+i*step,max:i===4?Infinity:min+(i+1)*step}))}
function stats(){let total=data.reduce((s,d)=>s+value(d),0),ws=data.reduce((s,d)=>s+score(d)*value(d),0),avg=total?ws/total:0;document.getElementById("total").textContent=fmtMetric(modeObj().field,total,1);document.getElementById("weighted").innerHTML=`<span style="color:${css(avg,1)}">${fmtScore(avg)}</span>`;document.getElementById("totalLabel").textContent=modeObj().label;document.getElementById("weightedLabel").textContent=`加权平均${CONFIG.scoreLabel||""}`;document.getElementById("scoreLabel").textContent=CONFIG.scoreLabel||CONFIG.scoreField;document.getElementById("legendTitle").textContent=`颜色图例：${CONFIG.scoreLabel||CONFIG.scoreField}`;document.querySelector(".legend-grad").style.background=legendGradient();document.getElementById("legendMin").textContent=fmtScore(scoreMin());document.getElementById("legendMax").textContent=fmtScore(scoreMax());histogram(total);tiers(total);groups(total);breakdown(total);topList()}
function histogram(total){const min=scoreMin(),max=scoreMax(),bins=Array(10).fill(0),step=(max-min)/10||1;for(const d of data){let idx=Math.floor((score(d)-min)/step);idx=Math.max(0,Math.min(9,idx));bins[idx]+=value(d)}let maxBin=Math.max(...bins,1);document.getElementById("hist").innerHTML=bins.map((b,i)=>{let a=min+i*step,c=i===9?max:min+(i+1)*step;return `<div title="${fmtScore(a)}-${fmtScore(c)}: ${fmtMetric(modeObj().field,b,1)} (${total?(b/total*100).toFixed(1):0}%)" style="height:${Math.max(2,b/maxBin*100)}%;background:${css(a+step/2,.75)}"></div>`}).join("");document.getElementById("histMin").textContent=fmtScore(min);document.getElementById("histMax").textContent=fmtScore(max)}
function tiers(total){let html="";for(const t of tierDefs()){let rows=data.filter(d=>score(d)>=t.min&&score(d)<t.max),v=rows.reduce((s,d)=>s+value(d),0),avg=v?rows.reduce((s,d)=>s+score(d)*value(d),0)/v:(t.min+t.max)/2;html+=`<div class="row"><span class="sw" style="background:${css(avg,1)}"></span><span class="name">${t.label}</span><span class="val">${fmtMetric(modeObj().field,v,1)}</span><span class="pct">${total?(v/total*100).toFixed(0):0}%</span></div>`}document.getElementById("tiers").innerHTML=html}
function groups(total){let by={};for(const d of data){let k=group(d);(by[k] ||= {v:0,ws:0});by[k].v+=value(d);by[k].ws+=score(d)*value(d)}document.getElementById("groups").innerHTML=Object.entries(by).sort((a,b)=>b[1].v-a[1].v).slice(0,12).map(([k,o])=>`<div class="row"><span class="sw" style="background:${css(o.ws/(o.v||1),1)}"></span><span class="name">${k}</span><span class="val">${fmtMetric(modeObj().field,o.v,1)}</span><span class="pct">${total?(o.v/total*100).toFixed(0):0}%</span></div>`).join("")}
function breakdown(total){const fields=CONFIG.breakdownFields||[];const el=document.getElementById("breakdownSection");if(!fields.length){el.style.display="none";return}el.style.display="flex";let max=Math.max(...fields.map(f=>data.reduce((s,d)=>s+(Number(d[f.field])||0),0)),1);document.getElementById("breakdown").innerHTML=fields.map(f=>{let v=data.reduce((s,d)=>s+(Number(d[f.field])||0),0);return `<div class="barrow"><span class="name">${f.label}</span><span class="track"><span class="fill" style="display:block;width:${Math.max(2,v/max*100)}%;background:${css(f.score ?? scoreMin()+(scoreMax()-scoreMin())*.5,.8)}"></span></span><span class="val">${fmtMetric(f.field,v,1)}</span></div>`}).join("")}
function topList(){let top=[...data].sort((a,b)=>score(b)-score(a)).slice(0,6);document.getElementById("topTitle").textContent=`高${CONFIG.scoreLabel||"颜色指标"}对象`;document.getElementById("topList").innerHTML=top.map(d=>`<div class="topitem"><span>${label(d)}</span><strong style="color:${css(score(d),1)}">${fmtScore(score(d))}</strong></div>`).join("")}
function hit(x,y){const sidebar=sidebarReserve(),top=parseInt(canvas.style.top)||0,cx=x-sidebar,cy=y-top;for(let i=rects.length-1;i>=0;i--){let r=rects[i];if(cx>=r.rx&&cx<r.rx+r.rw&&cy>=r.ry&&cy<r.ry+r.rh)return r}return null}
function show(d,x,y){const tt=document.getElementById("tooltip");tt.querySelector(".tt-title").textContent=label(d);let fields=CONFIG.tooltipFields||[];tt.querySelector(".tt-grid").innerHTML=fields.map(f=>`<span>${f.label}</span><span>${detailValue(d,f)}</span>`).join("");tt.querySelector(".tt-note").textContent=d[CONFIG.noteField]||"";let tx=x+16,ty=y-16;if(tx+360>innerWidth)tx=x-376;if(ty<10)ty=y+16;if(ty+240>innerHeight)ty=y-240;tt.style.left=tx+"px";tt.style.top=ty+"px";tt.classList.add("visible")}
function resize(){dpr=devicePixelRatio||1;layout();draw()}canvas.addEventListener("mousemove",e=>{let h=hit(e.clientX,e.clientY);if(h!==hovered){hovered=h;draw()}if(hovered){canvas.style.cursor="pointer";show(hovered,e.clientX,e.clientY)}else{canvas.style.cursor="default";document.getElementById("tooltip").classList.remove("visible")}});canvas.addEventListener("mouseleave",()=>{hovered=null;draw();document.getElementById("tooltip").classList.remove("visible")});window.addEventListener("resize",resize);
document.getElementById("modes").innerHTML=CONFIG.modes.map((m,i)=>`<button data-mode="${m.key}" class="${i===0?"active":""}">${m.label}</button>`).join("");document.getElementById("modes").addEventListener("click",e=>{let b=e.target.closest("button");if(!b)return;mode=b.dataset.mode;document.querySelectorAll("#modes button").forEach(x=>x.classList.remove("active"));b.classList.add("active");stats();resize()});
document.getElementById("toggleSidebar").addEventListener("click",()=>{const folded=document.body.classList.toggle("sidebar-collapsed");const b=document.getElementById("toggleSidebar");b.textContent=folded?"›":"‹";b.title=folded?"展开侧栏":"折叠侧栏";b.setAttribute("aria-label",b.title);resize()});
document.getElementById("signature").textContent=CONFIG.signature||"";
function boot(d){data=d;stats();resize()}
const embedded=document.getElementById("embeddedData").textContent.trim();
if(embedded&&embedded!=="null")boot(JSON.parse(embedded));else fetch(CONFIG.dataUrl||"data.json").then(r=>r.json()).then(boot);
</script>
</body>
</html>
